name: registry check

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check registry file
        run: |
          if [ ! -f nexus-core/registry.json ]; then
            echo "registry missing"
            exit 1
          fi

      - name: Validate json
        run: |
          node -e "const fs=require('fs'); const d=JSON.parse(fs.readFileSync('nexus-core/registry.json','utf8')); if(!d.system||!d.modules||!d.roles){console.log('invalid'); process.exit(1);} console.log('ok');"
