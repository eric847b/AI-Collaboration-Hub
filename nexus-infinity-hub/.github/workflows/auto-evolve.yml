name: Self-Evolve Nexus Hub

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  evolve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run evolve
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: '🤖 Auto-evolve: Updated modules via 05-07 chain'