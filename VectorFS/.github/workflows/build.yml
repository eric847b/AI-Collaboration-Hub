name: VectorFS CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            libfuse3-dev

      - name: Configure
        run: cmake -S . -B build -DVECTORFS_BUILD_FUSE=OFF -DVECTORFS_BUILD_TESTS=ON

      - name: Compile
        run: cmake --build build --parallel

      - name: Run unit tests
        run: ./build/vectorfs_tests

      - name: Smoke transaction test
        run: ./build/smoke_transaction
